{% for user in users %}
<tr id="user-row-{{ user.id }}">
    <td>{{ user.username }}</td>
    <td>{{ (user.full_name or '—') | mask_for_role('name') }}</td>
    <td>{{ (user.email or '—') | mask_for_role('email') }}</td>
    <td>
        {% for role in user.roles %}
            <span class="badge badge-info">{{ role.name }}</span>
        {% endfor %}
    </td>
    <td>
        {% if user.is_active %}
            <span class="badge badge-success">Active</span>
        {% else %}
            <span class="badge badge-danger">Inactive</span>
        {% endif %}
    </td>
    <td>
        <select hx-post="/api/admin/users/{{ user.id }}/roles" hx-target="#user-row-{{ user.id }}" hx-swap="outerHTML"
                name="role_name" hx-include="this">
            <option value="">+ Add Role</option>
            {% for role in roles %}
                <option value="{{ role.name }}">{{ role.name }}</option>
            {% endfor %}
        </select>
    </td>
</tr>
{% endfor %}

{% extends "base.html" %}
{% block title %}Training Classes{% endblock %}
{% block content %}
<div class="container">
    <div class="page-header">
        <h1>Training Classes</h1>
        <a href="/classes/new" class="btn btn-primary">+ New Class</a>
    </div>
    <input type="text" name="search" value="{{ search }}" placeholder="Search classes..."
           class="form-input search-input"
           hx-get="/api/classes" hx-trigger="keyup changed delay:300ms" hx-target="#class-list">
    <div id="class-list">{% include "classes/partials/class_list.html" %}</div>
</div>
{% endblock %}
